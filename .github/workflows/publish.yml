name: Publish client to npm

on:
  push:
    branches: [main]
    paths:
      - "packages/client/package.json"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-client
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Install
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run check

      - name: Test
        run: bun run test

      - name: Build client
        run: bun run build

      - name: Publish if the version changed
        working-directory: packages/client
        run: |
          name=$(jq -r .name package.json)
          local=$(jq -r .version package.json)
          remote=$(npm view "$name" version 2>/dev/null || echo "")
          if [ "$local" != "$remote" ]; then
            echo "Publishing $name@$local"
            npm publish --access public --provenance
          else
            echo "Skipping $name@$local (already published)"
          fi
